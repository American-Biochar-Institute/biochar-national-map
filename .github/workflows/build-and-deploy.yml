name: Build and deploy biochar national map

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: "Grid resolution in meters (300 = detailed browse, 1000 = fast test)"
        required: true
        default: "300"
      zoom:
        description: "Tile zoom range"
        required: true
        default: "3-9"
  schedule:
    - cron: "0 6 15 11 *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal python3-numpy
          gdalinfo --version

      - name: Build national tiles
        run: |
          python3 build_biochar_tiles.py \
            --lookup biochar_national_lookup.csv \
            --colors biochar_class_colors.txt \
            --out site \
            --res "${{ github.event.inputs.resolution || '300' }}" \
            --zoom "${{ github.event.inputs.zoom || '3-9' }}"

      - name: Add the viewer to the site root
        run: cp index.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
