name: Build and deploy biochar national map

on:
  workflow_dispatch:
    inputs:
      zoom:
        description: "Tile zoom range (50m data supports up to about z11)"
        required: true
        default: "3-11"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal
          gdalinfo --version

      - name: Fetch class raster from the latest Release
        run: |
          curl -L --fail -o biochar_class_50m.tif \
            "https://github.com/${{ github.repository }}/releases/latest/download/biochar_class_50m.tif"
          gdalinfo biochar_class_50m.tif | head -8

      - name: Build national tiles
        run: |
          python3 build_biochar_tiles.py \
            --class-raster biochar_class_50m.tif \
            --out site \
            --zoom "${{ github.event.inputs.zoom || '3-11' }}"

      - name: Add the viewer to the site root
        run: cp index.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
